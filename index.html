<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>מסלול · האימון היומי שלי</title>
<meta name="theme-color" content="#17141F">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="brand" id="brandHome" role="button" tabindex="0">
      <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M4 26 L13 8 L19 19 L23 12 L28 26" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">מסלול</span>
    </div>
    <div class="topbar-side">
      <div class="streak-chip" id="streakChip" title="רצף ימי אימון"></div>
      <button class="icon-btn" id="settingsBtn" aria-label="הגדרות">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.01a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.01a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
      </button>
    </div>
  </header>
  <main id="screen"></main>
</div>
<script>
/* rescue net: if a script error leaves the screen empty, offer a one-tap cache repair */
window.addEventListener('error', function () {
  setTimeout(function () {
    var s = document.getElementById('screen');
    if (s && !s.children.length && !document.getElementById('rescueBtn')) {
      s.innerHTML = '<div style="text-align:center;padding:70px 20px;font-family:sans-serif;color:#F4EEE1"><p style="margin-bottom:22px;font-size:17px">משהו השתבש בטעינה.</p><button id="rescueBtn" style="padding:15px 30px;border-radius:100px;border:none;background:#3ECFAC;color:#14110E;font-weight:700;font-size:16px;cursor:pointer">תיקון ורענון</button></div>';
      document.getElementById('rescueBtn').onclick = async function () {
        try {
          if (navigator.serviceWorker) { var rs = await navigator.serviceWorker.getRegistrations(); for (var i = 0; i < rs.length; i++) await rs[i].unregister(); }
          if (window.caches) { var ks = await caches.keys(); for (var j = 0; j < ks.length; j++) await caches.delete(ks[j]); }
        } catch (e) {}
        location.reload();
      };
    }
  }, 300);
});
</script>
<script src="js/content.js"></script>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
